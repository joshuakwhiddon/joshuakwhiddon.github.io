<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl w-full">
        <header class="mb-10 text-white">
            <h1 class="text-4xl font-bold tracking-tight">Welcome Back.</h1>
            <p class="opacity-80">Your digital ecosystem, all in one place.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 grid-rows-none md:grid-rows-3 gap-4 h-full">
            
            <a href="https://github.com" class="glass rounded-3xl p-8 md:col-span-2 md:row-span-2 flex flex-col justify-between group">
                <div class="flex justify-between items-start">
                    <i class="fa-brands fa-github text-5xl text-white opacity-90"></i>
                    <i class="fa-solid fa-arrow-up-right-from-square text-white opacity-0 group-hover:opacity-100 transition-opacity"></i>
                </div>
                <div>
                    <h2 class="text-white text-2xl font-bold mb-2">Development</h2>
                    <p class="text-white/70">Check repositories, pull requests, and contributions.</p>
                </div>
            </a>

            <a href="https://youtube.com" class="glass rounded-3xl p-6 md:col-span-2 flex items-center gap-6 group">
                <div class="bg-red-500/20 p-4 rounded-2xl">
                    <i class="fa-brands fa-youtube text-3xl text-red-400"></i>
                </div>
                <div>
                    <h2 class="text-white text-lg font-bold">Watch</h2>
                    <p class="text-white/60 text-sm">Latest uploads & subs.</p>
                </div>
            </a>

            <a href="https://gmail.com" class="glass rounded-3xl p-6 flex flex-col justify-center items-center text-center group">
                <i class="fa-solid fa-envelope text-3xl text-blue-300 mb-3"></i>
                <span class="text-white font-medium">Email</span>
            </a>

            <a href="https://twitter.com" class="glass rounded-3xl p-6 flex flex-col justify-center items-center text-center group">
                <i class="fa-brands fa-x-twitter text-3xl text-white mb-3"></i>
                <span class="text-white font-medium">Social</span>
            </a>

            <a href="https://notion.so" class="glass rounded-3xl p-6 md:col-span-2 flex justify-between items-center group">
                <div class="flex items-center gap-4">
                    <i class="fa-solid fa-note-sticky text-2xl text-yellow-300"></i>
                    <div class="text-white">
                        <h2 class="font-bold">Notion</h2>
                        <p class="text-white/60 text-xs">Knowledge base & plans.</p>
                    </div>
                </div>
                <div class="h-2 w-16 bg-white/20 rounded-full overflow-hidden">
                    <div class="h-full bg-yellow-300 w-3/4"></div>
                </div>
            </a>

            <a href="https://spotify.com" class="glass rounded-3xl p-6 md:row-span-1 flex items-center gap-4 group">
                <i class="fa-brands fa-spotify text-4xl text-green-400"></i>
                <div class="text-white">
                    <h2 class="font-bold text-sm">Spotify</h2>
                    <p class="text-white/60 text-xs">Currently Playing</p>
                </div>
            </a>

             <a href="https://pinterest.com" class="glass rounded-3xl p-6 flex flex-col justify-between group">
                <i class="fa-brands fa-pinterest text-2xl text-red-500"></i>
                <span class="text-white font-medium text-sm">Moodboard</span>
            </a>

        </div>
    </div>

</body>
</html>
